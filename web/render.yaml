# Render Blueprint for HybridDualPatNet
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: neurofusenet-web
    runtime: python
    plan: starter
    buildCommand: >-
      pip install -r requirements.txt
      --extra-index-url https://download.pytorch.org/whl/cpu
      && python download_model.py
      && python manage.py migrate --noinput
      && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: neurofusenet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: neurofusenet-redis
          type: redis
          property: connectionString
      - key: MODEL_WEIGHTS_PATH
        value: weights/final_model.pth
      - key: MODEL_WEIGHTS_URL
        sync: false
      - key: USE_S3_MEDIA
        value: "True"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_REGION_NAME
        value: auto
      - key: SECURE_SSL_REDIRECT
        value: "True"

  - type: worker
    name: neurofusenet-worker
    runtime: python
    plan: starter
    buildCommand: >-
      pip install -r requirements.txt
      --extra-index-url https://download.pytorch.org/whl/cpu
      && python download_model.py
    startCommand: celery -A config worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        fromService:
          name: neurofusenet-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: neurofusenet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: neurofusenet-redis
          type: redis
          property: connectionString
      - key: MODEL_WEIGHTS_PATH
        value: weights/final_model.pth
      - key: MODEL_WEIGHTS_URL
        sync: false
      - key: USE_S3_MEDIA
        value: "True"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_REGION_NAME
        value: auto

  - type: redis
    name: neurofusenet-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: neurofusenet-db
    plan: starter
    databaseName: neurofusenet
    user: neurofusenet
