# Render Blueprint — repo root (services run from web/)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hybridualnetpath-web
    runtime: python
    rootDir: web
    plan: starter
    buildCommand: >-
      pip install -r requirements.txt
      --extra-index-url https://download.pytorch.org/whl/cpu
      && python download_model.py
      && python manage.py migrate --noinput
      && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hybridualnetpath-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hybridualnetpath-redis
          type: redis
          property: connectionString
      - key: MODEL_WEIGHTS_PATH
        value: weights/final_model.pth
      - key: MODEL_WEIGHTS_URL
        value: https://drive.google.com/uc?export=download&id=1rDF-vTOgMSIrpE3rV1OXukyhXiVNxxRq
      - key: USE_S3_MEDIA
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "True"

  - type: worker
    name: hybridualnetpath-worker
    runtime: python
    rootDir: web
    plan: starter
    buildCommand: >-
      pip install -r requirements.txt
      --extra-index-url https://download.pytorch.org/whl/cpu
      && python download_model.py
    startCommand: celery -A config worker --loglevel=info --concurrency=1
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        fromService:
          name: hybridualnetpath-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: hybridualnetpath-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hybridualnetpath-redis
          type: redis
          property: connectionString
      - key: MODEL_WEIGHTS_PATH
        value: weights/final_model.pth
      - key: MODEL_WEIGHTS_URL
        value: https://drive.google.com/uc?export=download&id=1rDF-vTOgMSIrpE3rV1OXukyhXiVNxxRq
      - key: USE_S3_MEDIA
        value: "False"

  - type: redis
    name: hybridualnetpath-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: hybridualnetpath-db
    plan: starter
    databaseName: hybridualnetpath
    user: hybridualnetpath
